<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI配信ビューワー 🎮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap');

  :root {
    --bg: #0e0e10; --surface: #18181b; --surface2: #1f1f23;
    --border: #2a2a2d; --purple: #9147ff; --purple-light: #bf94ff;
    --green: #00db7f; --red: #e91916; --text: #efeff1; --text-muted: #adadb8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .live-badge { background:var(--red); color:white; font-size:11px; font-weight:700; padding:3px 8px; border-radius:3px; letter-spacing:1px; animation:pulse 2s infinite; }
  .header-title { font-weight:700; font-size:16px; }
  .viewer-count { margin-left:auto; color:var(--text-muted); font-size:13px; display:flex; align-items:center; gap:5px; }
  .viewer-dot { width:8px; height:8px; background:var(--red); border-radius:50%; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .main { display:flex; flex:1; overflow:hidden; }

  .screen-area { flex:1; display:flex; flex-direction:column; padding:12px; gap:10px; overflow:hidden; }

  .screen-preview { flex:1; background:#000; border-radius:8px; border:2px solid var(--border); position:relative; overflow:hidden; min-height:0; display:flex; align-items:center; justify-content:center; }
  .screen-preview video { width:100%; height:100%; object-fit:contain; }
  .screen-placeholder { text-align:center; color:var(--text-muted); }
  .screen-placeholder .icon { font-size:48px; margin-bottom:12px; }
  .screen-placeholder p { font-size:14px; line-height:1.8; }
  .ai-status { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.8); border:1px solid var(--purple); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--purple-light); }

  /* ニコニコ */
  #overlayContainer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .nico-comment { position:absolute; white-space:nowrap; font-size:22px; font-weight:900; font-family:'Noto Sans JP',sans-serif; text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000; animation:nicoScroll linear forwards; pointer-events:none; }
  @keyframes nicoScroll { from{transform:translateX(0)} to{transform:translateX(calc(-100% - 100vw))} }
  .nico-superchat { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); border-radius:10px; padding:12px 20px; pointer-events:none; animation:scPop .5s cubic-bezier(.34,1.56,.64,1) forwards,scFade .5s ease 4.5s forwards; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:10; white-space:nowrap; }
  @keyframes scPop { from{opacity:0;transform:translateX(-50%) scale(.7)} to{opacity:1;transform:translateX(-50%) scale(1)} }
  @keyframes scFade { to{opacity:0} }

  /* 視聴者数ウィジェット */
  #viewerWidget { position:absolute; top:10px; left:10px; background:rgba(0,0,0,.75); border:1px solid rgba(255,255,255,.15); border-radius:12px; padding:8px 14px; display:none; flex-direction:column; gap:4px; backdrop-filter:blur(8px); pointer-events:none; }
  .widget-row { display:flex; align-items:center; gap:7px; }
  .widget-live { background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; letter-spacing:1px; animation:pulse 2s infinite; }
  .widget-count { font-size:22px; font-weight:900; color:#fff; font-family:'Oswald',sans-serif; }
  .widget-label { font-size:10px; color:rgba(255,255,255,.6); }
  .widget-graph { display:flex; align-items:flex-end; gap:2px; height:20px; }
  .widget-bar { width:4px; background:var(--purple); border-radius:2px; transition:height .5s ease; min-height:2px; }

  .controls { display:flex; gap:8px; align-items:center; flex-shrink:0; flex-wrap:wrap; }
  .btn { padding:9px 18px; border-radius:6px; border:none; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-primary { background:var(--purple); color:white; }
  .btn-primary:hover:not(:disabled) { background:#7c3aed; transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background:var(--border); }
  .btn-green { background:var(--green); color:#000; }
  .btn-green:hover:not(:disabled) { background:#00c070; }
  .btn-red { background:var(--red); color:white; }
  .auto-badge { background:var(--green); color:#000; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:700; animation:pulse 1s infinite; }
  .interval-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:6px; font-size:13px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }

  .capture-status { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--text-muted); display:flex; align-items:center; gap:8px; flex-shrink:0; transition:all .3s; }
  .capture-status.active { border-color:var(--green); color:var(--green); }
  .capture-dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .capture-status.active .capture-dot { animation:pulse 1s infinite; }

  /* Chat */
  .chat-area { width:320px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  .chat-header { padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .chat-messages { flex:1; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:2px; }
  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .superchat { margin:6px 10px; border-radius:8px; padding:10px 12px; animation:slideIn .4s cubic-bezier(.34,1.56,.64,1); }
  .superchat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .superchat-name { font-weight:700; font-size:13px; }
  .superchat-amount { font-weight:900; font-size:15px; font-family:'Oswald',sans-serif; }
  .superchat-message { font-size:13px; line-height:1.5; }
  .sc-red    { background:linear-gradient(135deg,#e91916,#c0392b); color:white; }
  .sc-orange { background:linear-gradient(135deg,#ff6600,#e65c00); color:white; }
  .sc-yellow { background:linear-gradient(135deg,#ffb800,#f39c12); color:#000; }
  .sc-green  { background:linear-gradient(135deg,#00b86b,#009959); color:white; }
  .sc-blue   { background:linear-gradient(135deg,#1565c0,#0d47a1); color:white; }
  .sc-teal   { background:linear-gradient(135deg,#00acc1,#00838f); color:white; }

  .chat-msg { padding:4px 14px; font-size:13px; line-height:1.5; animation:slideIn .3s ease; display:flex; gap:6px; align-items:flex-start; }
  .chat-msg:hover { background:rgba(255,255,255,.03); }
  .chat-avatar { width:18px; height:18px; border-radius:50%; flex-shrink:0; margin-top:1px; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .chat-username { font-weight:700; margin-right:4px; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .thinking-indicator { padding:8px 14px; font-size:12px; color:var(--purple-light); display:flex; align-items:center; gap:8px; }
  .dots { display:flex; gap:3px; }
  .dot { width:5px; height:5px; background:var(--purple); border-radius:50%; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  .comment-count { margin-left:auto; background:var(--purple); color:white; font-size:11px; padding:2px 7px; border-radius:10px; }

  /* 設定パネル */
  .settings-panel { border-top:1px solid var(--border); padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
  .settings-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .settings-label { font-size:11px; color:var(--text-muted); white-space:nowrap; }
  .style-chip { padding:4px 10px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:11px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .style-chip.active { background:var(--purple); border-color:var(--purple); color:white; }
  .style-chip:hover:not(.active) { border-color:var(--purple-light); color:var(--purple-light); }

  .output-section { padding:6px 14px; border-top:1px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; }

  .api-section { padding:10px 14px; border-top:1px solid var(--border); }
  .api-label { font-size:11px; color:var(--text-muted); margin-bottom:5px; }
  .api-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:5px; font-size:12px; font-family:monospace; }
  .api-input:focus { outline:none; border-color:var(--purple); }

  .join-notice { padding:4px 14px; font-size:12px; color:var(--green); display:flex; align-items:center; gap:6px; animation:slideIn .3s ease; }
  .leave-notice { padding:4px 14px; font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:6px; animation:slideIn .3s ease; }

  /* デモモード */
  .demo-screen {
    width:100%; height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #efeff1;
  }
  .demo-icon { font-size:52px; }
  .demo-title { font-size:18px; font-weight:900; }
  .demo-sub { font-size:13px; color:#adadb8; text-align:center; line-height:1.7; }
  .demo-topic-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
  .demo-topic {
    padding:6px 14px; border-radius:20px; border:1px solid rgba(145,71,255,0.4);
    background:rgba(145,71,255,0.15); color:#bf94ff; font-size:13px; cursor:pointer;
    transition:all .15s; font-family:'Noto Sans JP',sans-serif;
  }
  .demo-topic:hover, .demo-topic.selected { background:rgba(145,71,255,0.5); border-color:#9147ff; color:#fff; }

  /* スマホ用レイアウト */
  @media (max-width: 640px) {
    body { height:auto; min-height:100vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .main { flex-direction:column; height:auto; overflow:visible; }
    .screen-area { padding:8px; gap:8px; height:auto; overflow:visible; }
    .screen-preview { min-height:280px; flex:none; height:280px; }
    .chat-area { width:100%; border-left:none; border-top:1px solid var(--border); height:auto; min-height:300px; overflow:visible; }
    .chat-messages { overflow-y:auto; max-height:260px; -webkit-overflow-scrolling:touch; }
    .controls { gap:6px; flex-wrap:wrap; }
    .btn { padding:8px 12px; font-size:12px; }
    .interval-select { font-size:12px; padding:7px 8px; }
    .settings-panel { padding:8px 10px; }
    .settings-row { gap:6px; }
    .style-chip { font-size:11px; padding:5px 10px; }
    .output-section { padding:6px 10px; }
    .api-section { padding:8px 10px; }
    .header-title { font-size:14px; }
    .capture-status { font-size:12px; padding:8px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="live-badge">● LIVE</span>
  <span class="header-title">🎮 AI視聴者チャット</span>
  <div class="viewer-count">
    <div class="viewer-dot"></div>
    <span id="viewerCount">0</span> 人が視聴中
  </div>
</div>

<div class="main">
  <div class="screen-area">
    <div class="screen-preview" id="screenPreview">
      <video id="screenVideo" autoplay muted playsinline style="display:none"></video>
      <canvas id="captureCanvas" style="display:none"></canvas>
      <div id="overlayContainer" style="display:none"></div>
      <div id="viewerWidget">
        <div class="widget-row">
          <span class="widget-live">LIVE</span>
          <span class="widget-count" id="widgetCount">0</span>
          <span class="widget-label">視聴中</span>
        </div>
        <div class="widget-graph" id="widgetGraph"></div>
      </div>
      <div class="screen-placeholder" id="placeholder">
        <div id="normalPlaceholder" style="display:none">
          <div class="icon">🖥️</div>
          <p id="placeholderText">「画面共有を開始」ボタンを押して<br>デスクトップを共有してください</p>
        </div>
      </div>
      <div class="ai-status" id="aiStatus" style="display:none">🤖 AI視聴中...</div>
    </div>

    <!-- テーマ選択UI（screen-previewの外に配置） -->
    <div id="demoScreen" class="demo-screen" style="border-radius:8px;border:2px solid var(--border);flex-shrink:0;">
      <div class="demo-icon">🎮</div>
      <div class="demo-title">デモモード</div>
      <div class="demo-sub">テーマをタップしてデモを開始！<br>（APIキー不要）</div>
      <div class="demo-topic-row" id="demoTopics">
        <button class="demo-topic" onclick="selectTopic(this,'ゲーム実況（FPS）')">🎯 FPS</button>
        <button class="demo-topic" onclick="selectTopic(this,'マインクラフト')">⛏️ マイクラ</button>
        <button class="demo-topic" onclick="selectTopic(this,'料理配信')">🍳 料理</button>
        <button class="demo-topic" onclick="selectTopic(this,'雑談配信')">💬 雑談</button>
        <button class="demo-topic" onclick="selectTopic(this,'プログラミング配信')">💻 プログラミング</button>
        <button class="demo-topic" onclick="selectTopic(this,'歌ってみた')">🎤 歌</button>
        <button class="demo-topic" onclick="selectTopic(this,'音楽ライブ配信')">🎸 ライブ</button>
        <button class="demo-topic" onclick="selectTopic(this,'ポケモン対戦')">⚡ ポケモン</button>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="shareBtn" onclick="startCapture()" style="display:none">🖥️ 画面共有を開始</button>
      <button class="btn btn-secondary" id="demoBtn" onclick="toggleDemo()">📱 デモモード</button>
      <button class="btn btn-red" id="stopBtn" onclick="stopCapture()" style="display:none">⏹ 共有停止</button>
      <button class="btn btn-red" id="stopDemoBtn" onclick="stopDemo()" style="display:none">⏹ デモ停止</button>
      <button class="btn btn-secondary" id="analyzeBtn" onclick="analyzeNow()">🎯 今すぐコメント</button>
      <button class="btn btn-green" id="autoBtn" onclick="toggleAuto()">▶ 自動モード</button>
      <select class="interval-select" id="intervalSelect">
        <option value="5000">5秒おき</option>
        <option value="10000" selected>10秒おき</option>
        <option value="20000">20秒おき</option>
        <option value="30000">30秒おき</option>
      </select>
      <span id="autoBadge" class="auto-badge" style="display:none">AUTO ON</span>
    </div>

    <div class="capture-status" id="captureStatus">
      <div class="capture-dot"></div>
      <span id="captureStatusText">画面共有していません — まず「画面共有を開始」を押してください</span>
    </div>

  </div>

  <div class="chat-area">
    <div class="chat-header">
      💬 チャット
      <span class="comment-count" id="commentCount">0</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="thinking-indicator" id="thinkingIndicator" style="display:none">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      AIが画面を分析中...
    </div>

    <!-- コメントスタイル設定 -->
    <div class="settings-panel">
      <div class="settings-label">💬 コメントスタイル（複数選択可）</div>
      <div class="settings-row" id="styleChips">
        <button class="style-chip active" data-style="ネットスラング多め">ネットスラング</button>
        <button class="style-chip" data-style="リアクション大げさ">大げさリアクション</button>
        <button class="style-chip" data-style="技術的なツッコミ多め">技術系</button>
        <button class="style-chip" data-style="ゆるくまったり">まったり</button>
        <button class="style-chip" data-style="ガチ勢っぽい上から目線">ガチ勢</button>
        <button class="style-chip" data-style="新規さん多め（質問が多い）">新規さん多め</button>
        <button class="style-chip" data-style="推しへの愛が重い">重めの愛</button>
        <button class="style-chip" data-style="ボケとツッコミの掛け合い">漫才系</button>
      </div>
    </div>

    <div class="output-section">
      <button class="btn btn-secondary" id="nicoBtn" onclick="toggleNico()" style="font-size:12px;padding:7px 12px">🎌 ニコニコ風 OFF</button>
      <button class="btn btn-secondary" id="widgetBtn" onclick="toggleWidget()" style="font-size:12px;padding:7px 12px">📊 視聴者数 OFF</button>
      <button class="btn btn-secondary" id="popupBtn" onclick="openPopupWindow()" style="font-size:12px;padding:7px 12px">🪟 別ウィンドウ</button>
      <button class="btn btn-secondary" id="nicoWinBtn" onclick="openNicoWindow()" style="font-size:12px;padding:7px 12px">🎌 ニコニコ専用画面</button>
    </div>

    <div class="api-section">
      <div class="api-label">Gemini API キー</div>
      <input type="password" class="api-input" id="apiKey" placeholder="AIza..." />
    </div>
  </div>
</div>

<script>
// ============================================================
// ローカル視聴者ジェネレーター（APIコストゼロ）
// ============================================================
const NAME_PARTS = {
  prefix: ['ゆき','はな','こう','たか','みな','りょう','あお','そら','ひな','けん','まさ','のぞ','いと','つき','れん','かい','ねこ','うさ','くま','きつね'],
  suffix: ['ちゃん','くん','P','氏','兄貴','先生','丸','子','太郎','次郎','star','LV','gg','zz','ww'],
  numbers: ['0','7','99','777','1','23','888','00','_','__'],
  prefix2: ['K_','M_','R_','S_','t_','y_','h_','__','vv','xx'],
  words:   ['neko','yuki','hana','game','live','pro','gg','kami','noob','push'],
};

const EMOJIS = ['🐔','😎','⭐','🎮','🌸','👾','🍡','🍜','🌀','😄','🌻','🐱','🥔','🦊','🐻','🎯','🔥','💫','🌈','🎸','🍕','🤖','👻','🦄','🐸','🎃','💎','🚀','🌙','⚡'];
const COLORS = ['#ff69b4','#00aaff','#ffcc00','#00db7f','#ff6b9d','#9147ff','#ff8c00','#e74c3c','#1abc9c','#3498db','#f1c40f','#8e44ad','#e67e22','#2ecc71','#e91e8c','#00bcd4','#ff5722','#607d8b','#9c27b0','#ff9800'];

let viewerPool = []; // 生成済み視聴者プール
let viewerIndex = 0;

function generateLocalViewer() {
  const style = Math.floor(Math.random() * 4);
  let name;
  if (style === 0) {
    name = pick(NAME_PARTS.prefix) + pick(NAME_PARTS.suffix) + pick(NAME_PARTS.numbers);
  } else if (style === 1) {
    name = pick(NAME_PARTS.prefix2) + pick(NAME_PARTS.words) + pick(NAME_PARTS.numbers);
  } else if (style === 2) {
    name = pick(NAME_PARTS.prefix) + pick(NAME_PARTS.prefix) + pick(NAME_PARTS.numbers);
  } else {
    name = pick(NAME_PARTS.words) + '_' + pick(NAME_PARTS.prefix) + Math.floor(Math.random()*100);
  }
  return {
    name,
    emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  };
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// 必要なだけ視聴者を取得（プールから or 新規生成）
function getViewers(count) {
  while (viewerPool.length < viewerIndex + count) {
    viewerPool.push(generateLocalViewer());
  }
  // 視聴者数に応じて使うインデックス範囲をずらして多様性を出す
  const available = viewerPool.slice(0, Math.min(viewerPool.length, Math.max(30, Math.floor(viewerCount / 10))));
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function getOneViewer() {
  if (viewerPool.length === 0) viewerPool.push(generateLocalViewer());
  return viewerPool[Math.floor(Math.random() * Math.min(viewerPool.length, Math.max(10, Math.floor(viewerCount / 10))))];
}

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ============================================================
// バッチ計画：AIコメント数（リアル比率）
// 目安: 100人→3〜8件, 1000人→20〜50件, 1万人→100〜300件
// AIバッチ上限は5並列×15件=75件。残りはローカル補完で水増し。
// ============================================================
function calcBatchPlan(viewers) {
  if (viewers < 10)    return { batches: 1, perBatch: rnd(1,2),   localMult: 0 };
  if (viewers < 50)    return { batches: 1, perBatch: rnd(3,5),   localMult: 0 };
  if (viewers < 200)   return { batches: 1, perBatch: rnd(5,8),   localMult: 0 };
  if (viewers < 500)   return { batches: 2, perBatch: rnd(7,10),  localMult: 1 };  // AI:14〜20 + local×1
  if (viewers < 1000)  return { batches: 2, perBatch: rnd(10,13), localMult: 2 };  // AI:20〜26 + local×2
  if (viewers < 3000)  return { batches: 3, perBatch: rnd(10,13), localMult: 3 };  // AI:30〜39 + local×3
  if (viewers < 10000) return { batches: 4, perBatch: rnd(12,15), localMult: 5 };  // AI:48〜60 + local×5
  if (viewers < 50000) return { batches: 5, perBatch: rnd(13,15), localMult: 8 };  // AI:65〜75 + local×8
  return               { batches: 5, perBatch: 15,                localMult: 15 }; // AI:75 + local×15
}

function startViewerFluctuation() {
  viewerCount = Math.floor(Math.random() * 15) + 3;
  updateViewerDisplay();

  // 視聴者プールを初期生成
  for (let i = 0; i < 50; i++) viewerPool.push(generateLocalViewer());

  // 最初の参加通知
  getViewers(3).forEach((v, i) => setTimeout(() => showJoinNotice(v), i * 700 + 300));

  viewerFluctuateInterval = setInterval(() => {
    const trend = viewerCount < 500 ? 4 : viewerCount < 2000 ? 1 : -2;
    const delta = Math.floor(Math.random() * 30) - 12 + trend;
    viewerCount = Math.max(1, viewerCount + delta);
    if (Math.random() < 0.04) viewerCount += Math.floor(Math.random() * 80) + 30; // 急増
    if (Math.random() < 0.02) viewerCount = Math.max(1, viewerCount - Math.floor(Math.random() * 50)); // 急減
    updateViewerDisplay();

    // 増えたとき参加通知
    if (delta > 15 && Math.random() < 0.5) {
      const v = generateLocalViewer();
      viewerPool.push(v);
      showJoinNotice(v);
    }
    // 減ったとき退出通知
    if (delta < -8 && viewerPool.length > 0 && Math.random() < 0.4) {
      showLeaveNotice(viewerPool[Math.floor(Math.random() * viewerPool.length)]);
    }
  }, 4000);
}

function stopViewerFluctuation() {
  if (viewerFluctuateInterval) { clearInterval(viewerFluctuateInterval); viewerFluctuateInterval = null; }
  viewerCount = 0;
  updateViewerDisplay();
}

function updateViewerDisplay() {
  document.getElementById('viewerCount').textContent = viewerCount.toLocaleString();
  document.getElementById('widgetCount').textContent = viewerCount.toLocaleString();
  viewerHistory.push(viewerCount);
  if (viewerHistory.length > 20) viewerHistory.shift();
  renderGraph();
  if (popupWindow && !popupWindow.closed) popupWindow.updateViewerCount && popupWindow.updateViewerCount(viewerCount);
}

function renderGraph() {
  const graph = document.getElementById('widgetGraph');
  graph.innerHTML = '';
  const max = Math.max(...viewerHistory, 1);
  viewerHistory.forEach(v => {
    const bar = document.createElement('div');
    bar.className = 'widget-bar';
    bar.style.height = Math.max(2, Math.round((v / max) * 20)) + 'px';
    graph.appendChild(bar);
  });
}

function localOnlyDemo() {

  if (viewerPool.length === 0) {
    for (let i = 0; i < 30; i++) viewerPool.push(generateLocalViewer());
  }
  // viewerCountが0なら初期値をセット
  if (viewerCount === 0) {
    viewerCount = Math.floor(Math.random() * 50) + 10;
    updateViewerDisplay();
  }
  if (!demoMode) startDemoMode();

  const plan = calcBatchPlan(viewerCount);
  const totalComments = plan.batches * plan.perBatch;
  const streamDuration = 7000;
  const topicComments = TOPIC_COMMENTS[demoTopic] || [];
  // テーマコメント40% + 汎用リアクション60% でミックス
  const pool = [
    ...topicComments, ...topicComments,           // テーマ系×2
    ...LOCAL_REACTIONS,                            // 汎用リアクション

  for (let i = 0; i < totalComments; i++) {
    const delay = Math.random() * streamDuration;
    setTimeout(() => {
      const viewer = getOneViewer();
      const text = pool[Math.floor(Math.random() * pool.length)];
      // たまにスパチャ
      if (Math.random() < 0.04) {
        const tier = pickSCTier();

  if (plan.localMult > 0) {
    generateLocalFlood(500, streamDuration * 0.8, plan.localMult * plan.perBatch);
  }
}

function captureFrame() {
  const video = document.getElementById('screenVideo');
  const canvas = document.getElementById('captureCanvas');
  if (!video.videoWidth) return null;
  const scale = Math.min(1, 1280 / video.videoWidth);
  canvas.width  = Math.round(video.videoWidth  * scale);
  canvas.height = Math.round(video.videoHeight * scale);
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7);
}

- JSONのみ返答（マークダウン不要）

{"comments":[{"name":"名前","type":"comment","text":"内容"}]}`
        : `日本のライブ配信のチャット欄です。以下の視聴者${plan.perBatch}人がコメントします。

視聴者：${viewerList}
${styleText}
現在の視聴者数：${viewerCount.toLocaleString()}人

ルール：
- 短くテンポよく（5〜20文字）
- 画面の内容に具体的に反応する
- スパチャも自然に混ぜる（視聴者数が多いほど確率UP）
- コメント者の名前は上記リストから使う
- JSONのみ返答（マークダウン不要）

{"comments":[{"name":"名前","type":"comment","text":"内容"}]}`;

      // Gemini parts（画像あり/なし）
      const parts = base64Data
        ? [
            { inline_data: { mime_type: 'image/jpeg', data: base64Data } },
            { text: promptText }
          ]
        : [{ text: promptText }];

      return fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts }] })
        }
      )
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error.message);
        const raw = data.candidates[0].content.parts.map(p => p.text || '').join('');
        const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
        return { comments: parsed.comments, commenters };
      });
    });

    // コメント間隔：視聴者数が多いほど短く（速く流れる）
    const totalAI = plan.batches * plan.perBatch;
    const streamDuration = 8000; // コメントを流す総時間(ms)
    const interval = Math.max(40, Math.min(400, streamDuration / totalAI));

    let globalDelay = 0;

    batchPromises.forEach(promise => {
      promise.then(({ comments, commenters }) => {
        comments.forEach((item) => {
          const delay = globalDelay;
          globalDelay += interval + Math.random() * interval * 0.5;
          setTimeout(() => {
            const viewer = commenters.find(v => v.name === item.name) || getOneViewer();
            if (item.type === 'superchat') {
              const tier = pickSCTier();
              if (tier) { dispatchSuperchat(viewer, item.text, tier); return; }
            }
            dispatchComment(viewer, item.text);
            // 草コメントはさらにフラッド
            if (isKusa(item.text)) generateKusaFlood(delay + interval);
          }, delay);
        });
      }).catch(err => addSystemMessage('❌ ' + err.message));
    });

    // ローカルリアクションで流速を補完（localMult × perBatch 件）
    if (plan.localMult > 0) {
      const localCount = plan.localMult * plan.perBatch;
      generateLocalFlood(interval * 2, streamDuration * 0.9, localCount);
    }

    // 全バッチ完了後にフラグ解除
    Promise.allSettled(batchPromises).then(() => {
      isAnalyzing = false;
      document.getElementById('thinkingIndicator').style.display = 'none';
      if (mediaStream) document.getElementById('analyzeBtn').disabled = false;
    });
    return; // finallyをスキップ

  } catch (err) {
    addSystemMessage('❌ ' + err.message);
  } finally {
    isAnalyzing = false;
    document.getElementById('thinkingIndicator').style.display = 'none';
    if (mediaStream) document.getElementById('analyzeBtn').disabled = false;
  }
}

function dispatchComment(viewer, text) {
  addComment(viewer, text);
  if (nicoEnabled) addNicoComment(viewer, text);
  if (popupWindow && !popupWindow.closed) popupWindow.addComment && popupWindow.addComment(viewer, text);
  if (nicoWindow && !nicoWindow.closed) nicoWindow.addNicoComment && nicoWindow.addNicoComment(text, viewer.color);
}

function dispatchSuperchat(viewer, text, tier) {
  addSuperchat(viewer, text, tier);
  if (nicoEnabled) addNicoSuperchat(viewer, text, tier);
  if (popupWindow && !popupWindow.closed) popupWindow.addSuperchat && popupWindow.addSuperchat(viewer, text, tier);
  if (nicoWindow && !nicoWindow.closed) nicoWindow.addNicoSuperchat && nicoWindow.addNicoSuperchat(viewer, text, tier);
  viewerCount += Math.floor(Math.random() * 30) + 10;
  updateViewerDisplay();
}

function pickLane() {
  const now = Date.now();
  let best = 0;
  for (let i = 1; i < LANES; i++) { if (laneAvail[i] < laneAvail[best]) best = i; }
  const h = document.getElementById('screenPreview').offsetHeight / LANES;
  laneAvail[best] = now + 5500;
  return best * h + 4;
}

function addNicoComment(viewer, text) {

  el.style.color = viewer.color;
  el.style.top = pickLane() + 'px';
  el.style.left = pw + 'px';
  el.style.animationDuration = duration + 's';
  overlay.appendChild(el);
  setTimeout(() => el.remove(), (duration + 0.5) * 1000);
